# PlaidCloud status page configuration — Upptime
# Docs: https://upptime.js.org/docs/configuration
#
# Branding (palette, logo, favicon, font) mirrors plaidcloud.com — see CLAUDE.md.
# Logo + favicon are embedded as data URIs so the page has zero external asset
# dependencies (keeps it fully isolated from PlaidCloud infrastructure).
#
# Each `slug` is the stable id used for incident/maintenance issue labels and the
# maintenance `expectedDown:` list. Don't rename slugs once incidents reference them.

owner: PlaidCloud
repo: plaidcloud-status

sites:
  - name: Organization and Workspace Management
    slug: app
    # / 302-redirects to /client/; check the app directly for a clean 200
    url: https://app.plaidcloud.com/client/

  - name: Documentation Website
    slug: docs
    url: https://docs.plaidcloud.com/

  - name: PlaidCloud Website
    slug: website
    url: https://plaidcloud.com/

status-website:
  cname: status.plaidcloud.com
  name: PlaidCloud Status
  theme: light
  introTitle: "PlaidCloud Platform Status"
  introMessage: "Live status and incident history for the PlaidCloud platform. Subscribe to the RSS feed or watch this repository for incident updates."
  logoUrl: 'data:image/png;base64,'
  faviconSvg: 'data:image/svg+xml;base64,'
  navbar:
    - title: Status
      href: /
    - title: PlaidCloud
      href: https://plaidcloud.com
  links:
    - rel: stylesheet
      href: https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap
  css: |
    /* PlaidCloud brand — light page, navy navbar, orange accents (mirrors plaidcloud.com) */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
        Helvetica, Arial, sans-serif;
    }
    :root {
      --body-background-color: #F8FAFD !important;   /* paper */
      --body-text-color: #101828 !important;         /* ink */
      --card-background-color: #FFFFFF !important;
      --card-border-color: #E2E8F0 !important;
      --nav-background-color: #041E4B !important;     /* navy */
      --nav-border-bottom-color: #041E4B !important;
      --nav-current-border-bottom-color: #FF7514 !important; /* orange */
      --submit-button-background-color: #FF7514 !important;
      --submit-button-color: #FFFFFF !important;
      --submit-button-border-color: transparent !important;
    }
    a { color: #FF7514; }              /* brand orange links */
    a:hover { color: #E0660F; }
    nav, nav a { color: #FFFFFF; }     /* white text/logo on navy */
    nav a:hover { color: #FDC20D; }    /* amber */
    nav img { height: 30px; width: auto; }
    nav .logo div { display: none; }    /* hide redundant "PlaidCloud Status" text; keep logo */
    footer { display: none; }           /* drop Upptime attribution footer (MIT: license kept in repo, no UI attribution required) */
    ::selection { background: #FF7514; color: #FFFFFF; }
